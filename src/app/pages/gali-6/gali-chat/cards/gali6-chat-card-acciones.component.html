<div class="g6card-acciones">
  @for (accion of acciones; track accion.actionId) {
    @if (accion.requiereDestino) {
      <div class="g6card-acciones__destino">
        <select class="g6card-acciones__select"
          [value]="destinoPara(accion)"
          (change)="setDestino(accion, $any($event.target).value)"
          aria-label="Elegir pantalla destino">
          @for (opt of screenCatalog; track opt.id) {
            <option [value]="opt.id">{{ opt.label }}</option>
          }
        </select>
        <button type="button"
          class="g6card-acciones__btn"
          [class.g6card-acciones__btn--primary]="accion.isPrimary"
          (click)="confirmarConDestino(accion)">
          {{ accion.label }}
        </button>
      </div>
    } @else {
      <button type="button"
        class="g6card-acciones__btn"
        [class.g6card-acciones__btn--primary]="accion.isPrimary"
        (click)="actionClick.emit(accion.actionId)">
        {{ accion.label }}
      </button>
    }
  }
</div>
