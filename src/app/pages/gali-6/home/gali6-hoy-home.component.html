<div class="hoy gali-stagger-in">

  <!-- ══════════════════════════════════════════════
       NIVEL 1 — HERO: la decisión más importante
  ══════════════════════════════════════════════ -->
  @if (!decisionDismissed()) {
    <div class="hoy__hero {{ getDecisionClass() }}">
      <div class="hoy__hero-header">
        <div class="hoy__hero-meta">
          <span class="hoy__hero-agente">{{ decision.agenteName }}</span>
          <span class="hoy__chip-proceso {{ getProcesoClass() }}">{{ getProcesoLabel() }}</span>
        </div>
        <button class="hoy__hero-dismiss" (click)="onDismiss()" aria-label="Recordar más tarde">×</button>
      </div>

      <h2 class="hoy__hero-titulo">{{ decision.titulo }}</h2>
      <p class="hoy__hero-desc">{{ decision.descripcion }}</p>

      <div class="hoy__hero-actions">
        <button class="hoy__cta-primario" (click)="onCtaPrincipal()">
          {{ decision.ctaPrincipal }} →
        </button>
        @if (decision.ctaSecundario) {
          <button class="hoy__cta-secundario" (click)="onDismiss()">
            {{ decision.ctaSecundario }}
          </button>
        }
      </div>
    </div>
  }

  <!-- ══════════════════════════════════════════════
       NIVEL 2 — PULSO: 3 KPIs del negocio
  ══════════════════════════════════════════════ -->
  <div class="hoy__kpis" role="list" aria-label="Indicadores del día">
    @for (kpi of kpis; track kpi.id) {
      <button class="hoy__kpi"
              [class.hoy__kpi--clickable]="!!kpi.detailRoute"
              (click)="onKpiClick(kpi)"
              [attr.aria-label]="kpi.label + ': ' + kpi.valor"
              role="listitem">
        <div class="hoy__kpi-label-row">
          <span class="hoy__kpi-label">{{ kpi.label }}</span>
          @if (kpi.deterministico) {
            <span class="hoy__kpi-fuente" title="Dato directo de Dropi. 100% confiable.">📊</span>
          }
        </div>
        <span class="hoy__kpi-valor">{{ kpi.valor }}</span>
        @if (kpi.delta) {
          <span class="hoy__kpi-delta"
                [class.hoy__kpi-delta--pos]="kpi.deltaPositivo"
                [class.hoy__kpi-delta--neg]="kpi.deltaPositivo === false">
            {{ kpi.delta }}
          </span>
        }
      </button>
    }
  </div>

  <!-- ══════════════════════════════════════════════
       NIVEL 3 — ACCESOS RÁPIDOS
  ══════════════════════════════════════════════ -->
  <nav class="hoy__accesos" aria-label="Accesos rápidos">
    @for (ar of accesos; track ar.id) {
      <button class="hoy__acceso" (click)="onAcceso(ar)"
              [attr.aria-label]="ar.label">
        <i [class]="ar.icon" aria-hidden="true"></i>
        <span class="hoy__acceso-label">{{ ar.label }}</span>
      </button>
    }
  </nav>

</div>

<!-- Toast de feedback -->
@if (toastMsg()) {
  <div class="hoy__toast" role="status" aria-live="polite">{{ toastMsg() }}</div>
}
