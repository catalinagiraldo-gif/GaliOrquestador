<div class="mode-bar">
  <!-- Básico / Experto — control principal del Hub -->
  <div class="mode-bar__complexity" role="group" aria-label="Nivel de vista del Hub">
    <span class="mode-bar__complexity-label">Vista</span>
    <button type="button"
      class="mode-bar__cx-btn"
      [class.mode-bar__cx-btn--active]="ws.complexityLevel() === 'novice'"
      [attr.aria-pressed]="ws.complexityLevel() === 'novice'"
      (click)="setComplexity('novice')"
      title="Básico: decisiones y brief primero">
      Básico
    </button>
    <button type="button"
      class="mode-bar__cx-btn"
      [class.mode-bar__cx-btn--active]="ws.complexityLevel() === 'expert'"
      [attr.aria-pressed]="ws.complexityLevel() === 'expert'"
      (click)="setComplexity('expert')"
      title="Experto: ciclo completo del negocio desbloqueado">
      Experto
    </button>
  </div>

  <!-- Objetivo semanal — clickeable -->
  <button type="button" class="mode-bar__objetivo" (click)="onObjetivoClick()" title="Editar objetivo">
    <span class="mode-bar__obj-label">🎯 {{ objetivoLabel }}</span>
    <div class="mode-bar__obj-bar" role="progressbar"
      [attr.aria-valuenow]="progress" aria-valuemin="0" aria-valuemax="100">
      <div class="mode-bar__obj-fill" [style.width.%]="progress"></div>
    </div>
    <span class="mode-bar__obj-nums">{{ objetivoActual }}/{{ objetivoMeta }} · {{ objetivoPeriodo }}</span>
  </button>

  <!-- Right: reconfigurar + autopilot + Gali status -->
  <div class="mode-bar__gali">
    <button type="button" class="mode-bar__reconfig" (click)="ws.requestReconfigure()" title="Reconfigurar Gali">
      <i class="pi pi-refresh"></i>
      <span>Reconfigurar</span>
    </button>

    <button type="button" class="mode-bar__config-autopilot"
      (click)="goToAgentes()"
      title="Configurar autopilot de agentes">
      <i class="pi pi-bolt"></i>
      <span>Autopilot</span>
      <i class="pi pi-arrow-right"></i>
    </button>

    <button
      type="button"
      class="mode-bar__gali-status"
      [ngClass]="ws.galiStatusClass"
      (click)="onGaliStatusClick()"
      data-proto-skip>
      <span class="mode-bar__gali-dot" aria-hidden="true"></span>
      <span>{{ ws.galiStatusLabel }}</span>
    </button>
  </div>
</div>
