<div
  class="gali-v5-shell"
  [class.gali-v5-shell--compact]="isCompactNav()"
  [class.gali-v5-shell--no-section]="!hasSectionPanel()"
  [class.gali-v5-shell--nav-collapsed]="sectionNavCollapsed()"
  [class.gali-v5-shell--panel-open]="galiState.galiMode() > 0">

  <dropi-header-ia2
    [userName]="(auth.user$ | async)?.name ?? 'Alejandra'"
    [galiMode]="galiState.galiMode()"
    [autopilotOn]="galiState.galiMode() === 2"
  />

  <div class="gali-v5-shell__body">
    <dropi-icon-rail />

    <dropi-section-nav
      *ngIf="hasSectionPanel()"
      [panel]="sectionPanel()"
      [collapsed]="sectionNavCollapsed()"
      (collapseRequested)="collapseSectionNav()"
    />

    <dropi-panel-splitter
      *ngIf="hasSectionPanel() && !sectionNavCollapsed()"
      [currentWidth]="sectionWidth()"
      (widthChange)="onSplitterWidthChange($event)"
      (dragStart)="onSplitterDragStart()"
      (dragEnd)="onSplitterDragEnd()"
    />

    <main class="gali-v5-shell__content">
      <button
        *ngIf="hasSectionPanel() && sectionNavCollapsed()"
        type="button"
        class="gali-v5-shell__nav-expand"
        data-proto-skip
        (click)="toggleSectionNav()"
        aria-label="Expandir menú de secciones">
        <i class="pi pi-angle-double-right"></i>
        <span>Secciones</span>
      </button>

      <router-outlet />
    </main>
  </div>

  <!-- Panel derecho de Gali -->
  @if (galiState.galiMode() > 0) {
    <div class="gali-v5-shell__panel-overlay" [class.gali-v5-shell__panel-overlay--in]="galiState.galiMode() > 0">
      <gali-right-panel (closed)="galiState.togglePanel()" />
    </div>
  }

  <dropi-menu-action />

  <div
    *ngIf="feedback.toast() as t"
    class="gali-v5-shell__toast"
    role="status"
    aria-live="polite">
    <i class="pi pi-check-circle"></i>
    {{ t.message }}
  </div>
</div>
